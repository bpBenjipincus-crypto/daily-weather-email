name: Daily Weather Email

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  send-weather-email:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch weather and send email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          WEATHER=$(curl -s "https://api.open-meteo.com/v1/forecast?latitude=51.5074&longitude=-0.1278&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&timezone=Europe/London")
          echo "Weather: $WEATHER"
          TEMP=$(echo "$WEATHER" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['current']['temperature_2m'])")
          HUMIDITY=$(echo "$WEATHER" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['current']['relative_humidity_2m'])")
          WIND=$(echo "$WEATHER" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['current']['wind_speed_10m'])")
          DATE=$(date "+%A, %d %B %Y")
          BODY="Good morning! London weather for $DATE: Temp ${TEMP}C, Humidity ${HUMIDITY}%, Wind ${WIND} km/h. Have a great day!"
          RESPONSE=$(curl -s -o /tmp/resend_out.txt -w "%{http_code}" -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"from\":\"onboarding@resend.dev\",\"to\":\"bpbenji.pincus@gmail.com\",\"subject\":\"Daily Weather - London\",\"text\":\"$BODY\"}")
          echo "HTTP Status: $RESPONSE"
          echo "Body: $(cat /tmp/resend_out.txt)"
